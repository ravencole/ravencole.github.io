    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    </svg>
    <script type="text/javascript">
        var W_HEIGHT           = window.innerHeight,
            W_WIDTH            = window.innerWidth,
            SVG                = document.getElementById('svg'),
            SVG_V              = "http://www.w3.org/2000/svg",
            RECT_SIZE          = 30,
            RECT_ROW_AMOUNT    = Math.ceil(W_HEIGHT / RECT_SIZE)
            RECT_COLUMN_AMOUNT = Math.ceil(W_WIDTH / RECT_SIZE)

        SVG.setAttributeNS(null, 'height', W_HEIGHT)
        SVG.setAttributeNS(null, 'width', W_WIDTH)

        for (var i = 0; i <= RECT_ROW_AMOUNT; i++) {
            for (var k = 0; k <= RECT_COLUMN_AMOUNT; k++) {
                var RECT   = document.createElementNS(SVG_V, 'rect'),
                    STYLES = {
                        x: k*RECT_SIZE,
                        y: i*RECT_SIZE,
                        height: RECT_SIZE,
                        width: RECT_SIZE,
                        stroke: 'black',
                        'stroke-width': 3,
                        fill: getRandomColor()
                    }
                    

                Object.keys(STYLES).map(style => {
                    RECT.setAttributeNS(null, style, STYLES[style])
                })

                SVG.appendChild(RECT)
            }
        }

        function getRandomColor() {
            return Array.apply(null, Array(6)).reduce((a,b) => `${a}${getRandomHexValue()}`, '#')
        }

        function getRandomHexValue() {
            var NUM = Math.floor(Math.random() * (15+1))

            return NUM > 9 ? 
                String.fromCharCode(55 + NUM) :
                `${NUM}`
        }
    </script>
</body>
</html>
